<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meyda Market - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --water-blue: #0096c7; 
            --water-blue-hover: #0077a3;
            --light-blue: #e6f4f1;
            --white: #ffffff; 
            --bg-color: #f5f8fa; 
            --text-color: #333; 
            --gray-text: #777;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.05); 
            --card-shadow: 0 4px 12px rgba(0,0,0,0.08);
            --border-color: #eee;
            --input-bg: #fafafa;
            --danger-color: #e74c3c;
        }
        body.dark-mode { 
            --white: #1e1e1e; 
            --bg-color: #121212; 
            --light-blue: #2a2a2a;
            --text-color: #e0e0e0; 
            --gray-text: #aaa;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.5); 
            --card-shadow: 0 4px 12px rgba(0,0,0,0.4);
            --border-color: #444;
            --input-bg: #2a2a2a;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding-bottom: 70px; 
            transition: background 0.3s, color 0.3s; 
        }

        /* Top Header */
        .top-header {
            display: flex; align-items: center; padding: 15px 20px;
            background: var(--white); gap: 15px; position: sticky; top: 0;
            z-index: 100; box-shadow: var(--shadow);
        }
        .region-btn {
            background: var(--water-blue); color: white; border: none; padding: 10px 15px;
            border-radius: 20px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 5px;
            white-space: nowrap; transition: 0.3s;
        }
        .region-btn:hover { background: var(--water-blue-hover); }
        
        .search-wrapper { flex-grow: 1; position: relative; }
        .search-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--gray-text); }
        .search-bar {
            width: 100%; background: var(--bg-color); border: 1px solid var(--border-color);
            padding: 10px 15px 10px 40px; border-radius: 20px; color: var(--text-color); 
            outline: none; box-sizing: border-box; transition: 0.3s;
        }
        .search-bar:focus { border-color: var(--water-blue); }
        
        .theme-toggle {
            background: var(--light-blue); border: none; color: var(--water-blue);
            padding: 10px 12px; border-radius: 50%; cursor: pointer; transition: 0.3s;
        }
        .theme-toggle:hover { background: var(--water-blue); color: var(--white); }

        /* Hero Banner Carousel */
        .hero-carousel-container {
            position: relative; margin: 15px 20px; border-radius: 15px; overflow: hidden; box-shadow: var(--card-shadow);
        }
        .hero-carousel {
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; scroll-behavior: smooth;
        }
        .hero-carousel::-webkit-scrollbar { display: none; }
        
        .carousel-slide {
            min-width: 100%; height: 180px; scroll-snap-align: center;
            background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; position: relative;
        }
        .carousel-slide::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4);
        }
        
        .carousel-indicators {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 10;
        }
        .indicator { width: 8px; height: 8px; background: rgba(255, 255, 255, 0.5); border-radius: 50%; cursor: pointer; transition: 0.3s; }
        .indicator.active { background: white; width: 20px; border-radius: 10px; }

        /* Categories */
        .categories-container {
            display: flex; align-items: center; background: var(--bg-color); padding: 5px 15px 10px 15px; position: relative; z-index: 10;
        }
        .categories-wrapper {
            display: flex; overflow-x: auto; scroll-behavior: smooth; gap: 10px; padding: 5px 0; 
            flex: 1; min-width: 0; scrollbar-width: none;
        }
        .categories-wrapper::-webkit-scrollbar { display: none; }
        
        .scroll-btn {
            background: var(--white); border: 1px solid var(--border-color); border-radius: 50%; min-width: 32px; width: 32px; height: 32px; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--water-blue); box-shadow: var(--shadow); z-index: 10; margin: 0 5px;
        }

        .cat-pill {
            background: var(--white); border: 1px solid var(--border-color); padding: 8px 18px; border-radius: 20px; font-size: 13px; 
            font-weight: 500; white-space: nowrap; cursor: pointer; box-shadow: var(--shadow); color: var(--text-color); transition: 0.3s; user-select: none;
        }
        .cat-pill:hover { border-color: var(--water-blue); }
        .cat-pill.active { background: var(--water-blue); color: white; border-color: var(--water-blue); }

        /* Products Grid */
        .products-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 10px 20px 20px 20px;
        }
        .product-card {
            background: var(--white); border-radius: 15px; padding: 12px; box-shadow: var(--card-shadow); position: relative; cursor: pointer; transition: transform 0.2s;
        }
        .product-card:hover { transform: translateY(-3px); }
        
        .product-img-placeholder { 
            width: 100%; height: 140px; background: var(--input-bg); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #999; font-size: 30px;
            overflow: hidden;
        }
        
        .wishlist-icon {
            position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.9); color: #ff4757; width: 32px; height: 32px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); z-index: 20; cursor: pointer; transition: 0.2s; user-select: none;
        }
        .wishlist-icon:hover { transform: scale(1.1); background: #fff; }

        .delete-ad-btn {
            position: absolute; top: 60px; right: 20px; background: rgba(255,255,255,0.9); color: #ff4757; width: 32px; height: 32px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); z-index: 20; cursor: pointer; transition: 0.2s; user-select: none;
        }
        .delete-ad-btn:hover { background: #ff4757; color: white; transform: scale(1.1); }
        
        .user-icon {
            position: absolute; top: 130px; left: 20px; background: var(--water-blue); color: white; width: 36px; height: 36px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 3px solid var(--white); z-index: 20; cursor: pointer; transition: 0.2s; user-select: none; overflow: hidden; box-shadow: var(--shadow);
        }
        .user-icon:hover { transform: scale(1.1); }
        .user-icon img { width: 100%; height: 100%; object-fit: cover; }
        
        .product-price { font-weight: bold; color: var(--water-blue); font-size: 18px; margin-top: 25px; }
        .product-title { font-size: 14px; margin: 6px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
        .product-location { font-size: 12px; color: var(--gray-text); display: flex; align-items: center; gap: 4px; }

        /* Mobile View */
        @media (max-width: 600px) {
            .hero-carousel-container { height: 160px; margin: 10px 15px; }
            .carousel-slide { height: 160px; }
            .products-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px 15px; }
            .product-card { padding: 10px; }
            .product-img-placeholder { height: 120px; }
            .product-price { font-size: 15px; margin-top: 20px; }
            .product-title { font-size: 13px; }
            .user-icon { width: 28px; height: 28px; top: 115px; left: 15px; font-size: 12px; border-width: 2px;}
            .wishlist-icon { width: 28px; height: 28px; top: 15px; right: 15px; font-size: 12px; }
            .delete-ad-btn { width: 28px; height: 28px; top: 50px; right: 15px; font-size: 12px; }
            .top-header { padding: 10px 15px; gap: 10px;}
            .region-btn { padding: 8px 12px; font-size: 12px;}
        }

        /* Modals */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(3px);
        }
        .modal-content {
            background: var(--white); width: 90%; max-width: 400px; border-radius: 20px;
            padding: 20px; max-height: 85vh; overflow-y: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.2); animation: slideUp 0.3s ease-out; color: var(--text-color);
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .detail-modal-content { max-width: 500px; padding: 0; overflow: hidden; display: flex; flex-direction: column; }
        .modal-scroll-area { padding: 20px; overflow-y: auto; max-height: calc(85vh - 50px); }
        .list-item { padding: 15px; border-bottom: 1px solid var(--border-color); cursor: pointer; display: flex; justify-content: space-between; font-size: 15px; transition: 0.2s; }
        .list-item:hover { background: var(--light-blue); border-radius: 10px; }
        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        
        /* 🚀 ሓዱሽ ማጂክ: CSS ን ኮሜንት, ሪፖርትን ተመሳሰልትን (Similar Products) */
        .action-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding: 15px 20px; background: var(--input-bg); position: sticky; top: 0; z-index: 30; }
        .report-btn { color: var(--danger-color); background: none; border: none; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: 0.2s; padding: 5px 10px; border-radius: 20px; }
        .report-btn:hover { background: rgba(231, 76, 60, 0.1); }
        
        .comments-section { margin-top: 20px; border-top: 1px solid var(--border-color); padding-top: 15px; }
        .comment-input-area { display: flex; gap: 10px; margin-bottom: 15px; }
        .comment-input { flex: 1; padding: 10px 15px; border: 1px solid var(--border-color); border-radius: 20px; background: var(--input-bg); color: var(--text-color); outline: none; }
        .comment-input:focus { border-color: var(--water-blue); }
        .comment-send-btn { background: var(--water-blue); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        
        .comment-card { display: flex; gap: 10px; margin-bottom: 15px; }
        .comment-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; background: var(--border-color); }
        .comment-body { background: var(--input-bg); padding: 10px 15px; border-radius: 0 15px 15px 15px; flex: 1; }
        .comment-name { font-size: 12px; font-weight: bold; margin-bottom: 4px; color: var(--water-blue); }
        .comment-text { font-size: 13px; line-height: 1.4; }
        .reply-btn { font-size: 11px; color: var(--gray-text); background: none; border: none; padding: 0; margin-top: 5px; cursor: pointer; }
        .reply-btn:hover { color: var(--water-blue); text-decoration: underline; }
        .reply-area { margin-left: 45px; margin-top: 10px; display: none; }
        .reply-card { display: flex; gap: 8px; margin-top: 10px; margin-left: 45px; }
        .reply-avatar { width: 25px; height: 25px; border-radius: 50%; object-fit: cover; }
        .reply-body { background: var(--bg-color); padding: 8px 12px; border-radius: 0 10px 10px 10px; flex: 1; font-size: 12px; border: 1px solid var(--border-color); }

        .similar-section { margin-top: 25px; padding-top: 15px; border-top: 1px dashed var(--border-color); }
        .similar-title { font-size: 15px; font-weight: bold; margin-bottom: 15px; color: var(--text-color); }
        .similar-scroll { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 10px; scrollbar-width: none; }
        .similar-scroll::-webkit-scrollbar { display: none; }
        .similar-card { min-width: 140px; max-width: 140px; background: var(--white); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; cursor: pointer; box-shadow: var(--shadow); transition: 0.2s; }
        .similar-card:hover { transform: scale(1.02); border-color: var(--water-blue); }
        .similar-img { width: 100%; height: 100px; object-fit: cover; background: var(--input-bg); }
        .similar-info { padding: 8px; }
        .similar-price { color: var(--water-blue); font-weight: bold; font-size: 13px; margin-bottom: 3px; }
        .similar-name { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-color); }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: var(--white);
            display: flex; justify-content: space-around; padding: 12px 0 15px 0; box-shadow: 0 -4px 15px rgba(0,0,0,0.05); z-index: 100;
        }
        .nav-item { color: var(--gray-text); font-size: 22px; text-decoration: none; position: relative; transition: 0.3s; user-select: none; }
        .nav-item:hover { color: var(--water-blue); }
        .nav-item.active { color: var(--water-blue); }
        .nav-item.active::after {
            content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            width: 5px; height: 5px; background: var(--water-blue); border-radius: 50%;
        }
        .add-btn {
            background: var(--water-blue); color: white !important; width: 50px; height: 50px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-top: -25px;
            box-shadow: 0 4px 10px rgba(0, 150, 199, 0.4); border: 4px solid var(--white);
        }
        body.dark-mode .add-btn { border-color: var(--bg-color); }
    </style>
</head>
<body>

    <div class="top-header">
        <button class="region-btn" onclick="openRegionModal()">
            <i class="fas fa-map-marker-alt"></i> <span id="selectedLocation">Region</span>
        </button>
        <div class="search-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" class="search-bar" placeholder="ድለይ (Search)..." oninput="applyFilters()">
        </div>
        
        <button id="adminDashBtn" class="theme-toggle" style="display: none; color: var(--danger-color);" onclick="window.location.href='dashboard.html'" title="Admin Dashboard">
            <i class="fas fa-shield-alt"></i>
        </button>
        
        <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></button>
    </div>

    <div class="hero-carousel-container">
        <div class="hero-carousel" id="heroCarousel" onscroll="updateCarouselDots()"></div>
        <div class="carousel-indicators" id="carouselIndicators"></div>
    </div>

    <div class="categories-container">
        <div class="scroll-btn" onclick="scrollCats(-1)"><i class="fas fa-chevron-left"></i></div>
        <div class="categories-wrapper" id="catWrapper">
            <div class="cat-pill active" onclick="selectCat(this, 'all')">All</div>
            <div class="cat-pill" onclick="selectCat(this, 'vehicles')">ተሽከርከርቲ</div>
            <div class="cat-pill" onclick="selectCat(this, 'electronics')">ኤሌክትሮኒክስ</div>
            <div class="cat-pill" onclick="selectCat(this, 'mobile')">ሞባይል</div>
            <div class="cat-pill" onclick="selectCat(this, 'music')">ሙዚቃ መሳርሒ</div>
            <div class="cat-pill" onclick="selectCat(this, 'fashion')">ፋሽን</div>
            <div class="cat-pill" onclick="selectCat(this, 'houses')">ገዛውቲ</div>
            <div class="cat-pill" onclick="selectCat(this, 'sports')">ስፖርት</div>
            <div class="cat-pill" onclick="selectCat(this, 'furniture')">ፈርኒቸር</div>
            <div class="cat-pill" onclick="selectCat(this, 'books')">መፃሕፍቲ</div>
            <div class="cat-pill" onclick="selectCat(this, 'cosmetics')">ኮስሞቲክስ</div>
            <div class="cat-pill" onclick="selectCat(this, 'laptop')">ላፕቶፕ</div>
        </div>
        <div class="scroll-btn" onclick="scrollCats(1)"><i class="fas fa-chevron-right"></i></div>
    </div>

    <div class="products-grid">
        <div style="grid-column: span 100%; text-align: center; color: var(--gray-text); padding: 30px;">
            <i class="fas fa-spinner fa-spin"></i> ዕዳጋ ይዳሎ ኣሎ...
        </div>
    </div>

    <div class="modal-overlay" id="regionModal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border-color); padding-bottom:15px;">
                <button id="backBtn" onclick="showRegions()" style="display:none; border:none; background:none; color:var(--water-blue); cursor:pointer; font-size:18px;"><i class="fas fa-arrow-left"></i></button>
                <h3 id="modalTitle" style="margin:0; flex-grow:1; text-align:center;">ክልል ምረጽ</h3>
                <button onclick="closeRegionModal()" style="border:none; background:none; font-size:24px; color:var(--gray-text); cursor:pointer;">&times;</button>
            </div>
            <ul id="locationList" style="list-style:none; padding:0; margin-top:15px; margin-bottom:0;"></ul>
        </div>
    </div>

    <div class="modal-overlay" id="productModal">
        <div class="modal-content detail-modal-content">
            
            <div class="action-header">
                <button class="report-btn" onclick="reportProduct()"><i class="fas fa-flag"></i> ሪፖርት (Report)</button>
                <button onclick="closeProduct()" style="border:none; background:none; font-size:26px; cursor:pointer; color:var(--gray-text);">&times;</button>
            </div>
            
            <div class="modal-scroll-area" id="modalScrollArea">
                <div id="modalImageArea" style="height:200px; margin-top:5px; position:relative;"></div>
                
                <h2 id="detTitle" style="color:var(--water-blue); margin:15px 0 10px 0;"></h2>
                <div class="info-row" id="rowPrice"><span>ዋጋ:</span> <b id="detPrice" style="color:var(--water-blue); font-size:18px;"></b></div>
                <div class="info-row" id="rowCond"><span>ኩነታት:</span> <b id="detCond"></b></div>
                <div class="info-row" id="rowLoc"><span>ቦታ:</span> <b id="detLoc"></b></div>
                
                <div style="margin-top:20px;">
                    <strong>ዝርዝር ሓበሬታ (Description):</strong>
                    <p id="detDesc" style="font-size:14px; color:var(--gray-text); line-height:1.6; margin-top:8px; white-space: pre-wrap;"></p>
                </div>

                <div id="contactActionArea" style="margin-top: 20px; border-top: 1px solid var(--border-color); padding-top: 15px;">
                    <textarea id="messageText" rows="2" placeholder="ንሸያጢ ቀጥታ መልእኽቲ ጽሓፉሉ..." style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; box-sizing: border-box; background: var(--input-bg); color: var(--text-color); font-family: inherit; margin-bottom: 10px; resize: none; outline: none;"></textarea>
                    
                    <div style="display: flex; gap: 10px;">
                        <button onclick="callSeller()" style="flex: 1; background: #2ecc71; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s;">
                            <i class="fas fa-phone-alt"></i> ደውል
                        </button>
                        <button onclick="sendMessage()" style="flex: 2; background: var(--water-blue); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s;">
                            <i class="fas fa-paper-plane"></i> መልእኽቲ ስደድ
                        </button>
                    </div>
                </div>

                <div class="comments-section">
                    <h3 style="font-size: 16px; margin-bottom: 15px;"><i class="far fa-comments"></i> ርእይቶታት (<span id="commentCount">0</span>)</h3>
                    
                    <div class="comment-input-area">
                        <input type="text" id="commentInput" class="comment-input" placeholder="ርእይቶኹም ጽሓፉ...">
                        <button class="comment-send-btn" onclick="postComment()"><i class="fas fa-paper-plane"></i></button>
                    </div>
                    
                    <div id="commentsList">
                        </div>
                </div>

                <div class="similar-section" id="similarSection" style="display: none;">
                    <div class="similar-title">ነዚ ዝመስሉ (Similar Items)</div>
                    <div class="similar-scroll" id="similarProductsList">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item active"><i class="fas fa-home"></i></a>
        <a href="news.html" class="nav-item"><i class="fas fa-newspaper"></i></a>
        <a href="sell.html" class="nav-item add-btn"><i class="fas fa-plus"></i></a>
        <a href="notification.html" class="nav-item"><i class="fas fa-bell"></i></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i></a>
    </div>

   <script>
    document.addEventListener("DOMContentLoaded", async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (token) {
            try {
                const response = await fetch(`https://meyda-app.onrender.com/api/users/${token}`);
                const userData = await response.json();
                
                const userForStorage = {
                    id: userData._id, name: userData.name, email: userData.email, 
                    profilePic: userData.profilePic, phone: userData.phone, 
                    role: userData.role || 'user', 
                    isAdmin: userData.role === 'admin' || userData.role === 'owner',
                    isSubscribed: userData.isSubscribed || false,
                    packageType: userData.packageType || 'none',
                    expireDate: userData.expireDate || null
                };
                
                localStorage.setItem('meydaUser', JSON.stringify(userForStorage));
                window.history.replaceState({}, document.title, window.location.pathname);
                window.location.reload();
            } catch (error) {
                console.error("ጌጋ ኣጋጢሙ:", error);
            }
        }
    });

    function getLoggedInUser() {
        let userStr = localStorage.getItem('meydaUser') || localStorage.getItem('meyda_user');
        
        if (!userStr || userStr === 'undefined' || userStr === 'null') {
            localStorage.removeItem('meydaUser'); localStorage.removeItem('meyda_user');
            return null;
        }
        
        try {
            let userObj = JSON.parse(userStr);
            if (userObj.user) userObj = userObj.user;
            
            if (!userObj || (!userObj.id && !userObj._id)) {
                localStorage.removeItem('meydaUser'); localStorage.removeItem('meyda_user');
                return null;
            }
            
            userObj.id = userObj.id || userObj._id;
            userObj.role = userObj.role || 'user'; 
            
            if(userObj.name && userObj.name.toLowerCase().includes('jentra')) {
                userObj.role = 'owner'; userObj.isAdmin = true;
            }
            return userObj;
        } catch(e) { 
            localStorage.removeItem('meydaUser'); localStorage.removeItem('meyda_user');
            return null; 
        }
    }

    let carouselInterval;
    function updateCarouselDots() {
        const carousel = document.getElementById('heroCarousel');
        if(!carousel) return;
        const indicators = document.querySelectorAll('.indicator');
        const slideWidth = carousel.clientWidth;
        const index = Math.round(carousel.scrollLeft / slideWidth);
        indicators.forEach((ind, i) => {
            if(i === index) ind.classList.add('active');
            else ind.classList.remove('active');
        });
    }

    function scrollToSlide(index) {
        const carousel = document.getElementById('heroCarousel');
        const slideWidth = carousel.clientWidth;
        carousel.scrollTo({ left: slideWidth * index, behavior: 'smooth' });
    }

    function startCarouselAutoScroll() {
        clearInterval(carouselInterval);
        carouselInterval = setInterval(() => {
            const carousel = document.getElementById('heroCarousel');
            if(carousel) {
                const maxScroll = carousel.scrollWidth - carousel.clientWidth;
                if (carousel.scrollLeft >= maxScroll - 10) carousel.scrollTo({ left: 0, behavior: 'smooth' });
                else carousel.scrollBy({ left: carousel.clientWidth, behavior: 'smooth' });
            }
        }, 4000);
    }

    // 🚀 ሓዱሽ ማጂክ: Comments & Replies Logic (ኮሜንትን ሪፕላይን)
    // =====================================================================
    function renderComments(comments) {
        document.getElementById('commentCount').innerText = comments.length;
        const listEl = document.getElementById('commentsList');
        listEl.innerHTML = '';

        if(comments.length === 0) {
            listEl.innerHTML = '<p style="text-align:center; color:var(--gray-text); font-size:13px; margin: 20px 0;">ዛጊት ርእይቶ የለን። ቀዳማይ ርእይቶ ሃቡ!</p>';
            return;
        }

        comments.forEach(comment => {
            const dateStr = new Date(comment.createdAt).toLocaleDateString('en-GB');
            const pic = comment.userPic && comment.userPic.trim() !== "" ? getImageUrl(comment.userPic) : 'https://via.placeholder.com/150';
            
            let repliesHTML = '';
            if (comment.replies && comment.replies.length > 0) {
                comment.replies.forEach(reply => {
                    const rPic = reply.userPic && reply.userPic.trim() !== "" ? getImageUrl(reply.userPic) : 'https://via.placeholder.com/150';
                    repliesHTML += `
                        <div class="reply-card">
                            <img src="${rPic}" class="reply-avatar">
                            <div class="reply-body">
                                <span style="font-weight:bold; color:var(--water-blue);">${reply.userName}</span>: 
                                <span>${reply.text}</span>
                            </div>
                        </div>
                    `;
                });
            }

            listEl.innerHTML += `
                <div class="comment-card">
                    <img src="${pic}" class="comment-avatar">
                    <div style="flex:1;">
                        <div class="comment-body">
                            <div class="comment-name">${comment.userName} <span style="color:var(--gray-text); font-size:10px; font-weight:normal; float:right;">${dateStr}</span></div>
                            <div class="comment-text">${comment.text}</div>
                        </div>
                        <button class="reply-btn" onclick="toggleReplyBox('${comment._id}')">ሪፕላይ ሃብ (Reply)</button>
                        
                        ${repliesHTML}
                        
                        <div class="reply-area" id="replyArea_${comment._id}">
                            <div style="display:flex; gap:5px;">
                                <input type="text" id="replyInput_${comment._id}" class="comment-input" style="padding: 6px 12px; font-size:12px;" placeholder="ሪፕላይ ጽሓፉ...">
                                <button class="comment-send-btn" style="width:30px; height:30px; font-size:12px;" onclick="postReply('${comment._id}')"><i class="fas fa-reply"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    async function postComment() {
        const loggedInUser = getLoggedInUser();
        if (!loggedInUser) { alert("ርእይቶ ንምሃብ ሎግ-ኢን ግበሩ!"); return; }
        const text = document.getElementById('commentInput').value.trim();
        if (!text) return;
        if (!currentViewedProduct) return;

        try {
            const response = await fetch(`https://meyda-app.onrender.com/api/products/${currentViewedProduct._id}/comment`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: loggedInUser.id, userName: loggedInUser.name, userPic: loggedInUser.profilePic, text: text })
            });
            const data = await response.json();
            if(response.ok) {
                document.getElementById('commentInput').value = '';
                currentViewedProduct.comments = data.comments; // Update local state
                renderComments(data.comments);
                // Update in allProducts list so it persists when modal closes
                const idx = allProducts.findIndex(p => p._id === currentViewedProduct._id);
                if(idx !== -1) allProducts[idx].comments = data.comments;
            } else alert("ጌጋ: " + data.message);
        } catch(e) { alert("ምስ ሰርቨር ኣይተራኸበን።"); }
    }

    async function postReply(commentId) {
        const loggedInUser = getLoggedInUser();
        if (!loggedInUser) { alert("ሪፕላይ ንምሃብ ሎግ-ኢን ግበሩ!"); return; }
        const inputEl = document.getElementById(`replyInput_${commentId}`);
        const text = inputEl.value.trim();

            const response = await fetch(`https://meyda-app.onrender.com/api/products/${currentViewedProduct._id}/comment/${commentId}/reply`, {

                body: JSON.stringify({ userId: loggedInUser.id, userName: loggedInUser.name, userPic: loggedInUser.profilePic, text: text })
            });
            const data = await response.json();
            if(response.ok) {
                currentViewedProduct.comments = data.comments; 
                renderComments(data.comments);
                const idx = allProducts.findIndex(p => p._id === currentViewedProduct._id);
                if(idx !== -1) allProducts[idx].comments = data.comments;
            } else alert("ጌጋ: " + data.message);
        } catch(e) { alert("ምስ ሰርቨር ኣይተራኸበን።"); }
    }

    // =====================================================================
    // 🚀 ሓዱሽ ማጂክ: Similar Products & Infinite Rotation
    // =====================================================================
    function loadSimilarProducts(currentProduct) {
        const similarSection = document.getElementById('similarSection');
        const similarList = document.getElementById('similarProductsList');
        similarList.innerHTML = '';

        // ንቡር ንብረት (Market) ጥራሕ እዩ ተመሳሳሊ ዝደሊ (Advert ንበይኑ እዩ)
        if(currentProduct.adType === 'advert' || currentProduct.category === 'advert') {
            similarSection.style.display = 'none'; return;
        }

        // ተመሳሳሊ ካታጎሪ ዘለዎም (ነዚ ሕጂ ተኸፊቱ ዘሎ ግን ኣይተምጽኣዮ)
        let similar = allProducts.filter(p => 
            p.category === currentProduct.category && 
            p._id !== currentProduct._id &&
            p.adType !== 'advert'
        );

        if(similar.length === 0) {
            similarSection.style.display = 'none'; return;
        }

        similarSection.style.display = 'block';
        
        // ክሳብ 10 ተመሳሰልቲ ጥራሕ ነርኢ
        similar.slice(0, 10).forEach(prod => {
            const card = document.createElement('div');
            card.className = 'similar-card';
            // 🚀 ማጂክ ሮቴት (Recursive Call): ኣብቲ ተመሳሳሊ ምስ ጠወቐ፡ እንደገና ነቲ ፖፕ-ኣፕ ብሓዱሽ ይጽዕኖ!
            card.onclick = () => openProduct(prod);

            let imgHTML = prod.images && prod.images.length > 0 
                ? `<img src="${getImageUrl(prod.images[0])}" class="similar-img">` 
                : `<div class="similar-img" style="display:flex; align-items:center; justify-content:center; color:#999; font-size:24px;"><i class="fas ${prod.icon || 'fa-box'}"></i></div>`;

            card.innerHTML = `
                ${imgHTML}
                <div class="similar-info">
                    <div class="similar-price">${prod.price}</div>
                    <div class="similar-name">${prod.title}</div>
                </div>
            `;
            similarList.appendChild(card);
        });
    }

            if (response.ok) {

    }

    async function sendMessage() {
        const loggedInUser = getLoggedInUser();
        if (!loggedInUser) { alert("መልእኽቲ ንምልኣኽ ሎግ-ኢን ግበሩ!"); window.location.href = 'index.html'; return; }

    }

    function getImageUrl(imgStr) {
        if (!imgStr) return '';
        if (imgStr.startsWith('http') || imgStr.startsWith('data:image')) return imgStr;
        return `https://meyda-app.onrender.com${imgStr}`;
    }

    let allProducts = []; 
    let sellersCache = {}; 

    async function loadProducts() {
        const productsGrid = document.querySelector('.products-grid');
        
        try {
            const cachedProducts = localStorage.getItem('meydaProducts');
            const cachedSellers = localStorage.getItem('meydaSellers');
            
            if (cachedProducts && cachedSellers) {
                allProducts = JSON.parse(cachedProducts);
                sellersCache = JSON.parse(cachedSellers);
                applyFilters(); 
                updateHeroBanner();
            }
        } catch(e) { console.log("Cache read error", e); }

        try {
            const response = await fetch('https://meyda-app.onrender.com/api/products');
            const freshProducts = await response.json(); 
            
            const uniqueSellerIds = [...new Set(freshProducts.map(p => p.sellerId).filter(id => id))];
            
            try {
                const usersRes = await fetch('https://meyda-app.onrender.com/api/admin/users');
                if (usersRes.ok) {
                    const allUsers = await usersRes.json();
                    allUsers.forEach(u => {
                        if(uniqueSellerIds.includes(u._id)) {
                            sellersCache[u._id] = u.profilePic || "";
                        }
                    });
                }
            } catch(e) {}
            
            try {
                localStorage.setItem('meydaProducts', JSON.stringify(freshProducts));
                localStorage.setItem('meydaSellers', JSON.stringify(sellersCache));
            } catch (e) { console.log("Local storage full", e); }
            
            allProducts = freshProducts;
            applyFilters(); 
            updateHeroBanner(); 
            
        } catch (error) { 
            if(allProducts.length === 0) {
                productsGrid.innerHTML = '<p style="text-align:center; width:100%; color:var(--danger-color);">ምስ ዳታቤዝ ክራኸብ ኣይከኣለን። ሰርቨር ሪስታርት ግበሩ ወይ ኢንተርኔትኩም ኣረጋግጹ።</p>'; 
            }
        }
    }

    function updateHeroBanner() {

                    : `<div style="font-size: 15px; font-weight: bold; color: #4cd137; text-shadow: 0 2px 4px rgba(0,0,0,0.8); background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 8px; border: 1px solid rgba(76, 209, 55, 0.3);">${product.price}</div>`;

                    <div style="position: absolute; bottom: 0; left: 0; width: 100%; padding: 40px 15px 15px 15px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); color: white; box-sizing: border-box; text-align: left; z-index: 2;">
                        <div style="display: flex; justify-content: space-between; align-items: flex-end;">

                indicator.onclick = () => scrollToSlide(index); indicatorsContainer.appendChild(indicator);
            });
        }
        startCarouselAutoScroll();

    function displayProducts(productsToShow) {
        const productsGrid = document.querySelector('.products-grid');
        productsGrid.innerHTML = ''; 
        if (productsToShow.length === 0) { productsGrid.innerHTML = '<p style="text-align:center; width:100%; color:var(--gray-text); padding: 30px;">ኣብዚ ቦታን ምድብን ዝተመዝገበ ንብረት የለን።</p>'; return; }

        const loggedInUser = getLoggedInUser();
        const mySavedList = (loggedInUser && loggedInUser.savedProducts) ? loggedInUser.savedProducts : [];
        const userRole = loggedInUser ? loggedInUser.role : 'user';
        const isGodMode = (userRole === 'owner' || userRole === 'admin'); 

        productsToShow.forEach(product => {
            const productCard = document.createElement('div'); productCard.className = 'product-card';
            productCard.onclick = () => openProduct(product);

            let imageHTML = product.images && product.images.length > 0 
    ? `<img src="${getImageUrl(product.images[0])}" style="width: 100%; height: 140px; object-fit: contain; background: var(--input-bg); border-radius: 10px;">` 
    : `<div class="product-img-placeholder"><i class="fas ${product.icon || 'fa-box'}"></i></div>`;
            const isSaved = mySavedList.includes(product._id);
            const heartClass = isSaved ? 'fas' : 'far'; const heartStyle = isSaved ? 'color: #ff4757;' : '';
            
            const sellerPic = sellersCache[product.sellerId];
            const avatarHTML = (sellerPic && sellerPic.trim() !== "" && !sellerPic.includes('undefined')) 
                ? `<img src="${sellerPic}" alt="Seller">` 
                : `<i class="fas fa-user"></i>`;

            let deleteBtnHTML = '';
            if (isGodMode || (loggedInUser && loggedInUser.id === product.sellerId)) {
                deleteBtnHTML = `<div class="delete-ad-btn" onclick="event.stopPropagation(); deleteProductAdmin('${product._id}')" title="ኣቕሓ ደምስስ"><i class="fas fa-trash"></i></div>`;
            }

            let gridPriceHTML = (product.adType === 'advert' || product.category === 'advert')
                ? `<div class="product-price" style="color: #f1c40f; font-size: 13px;"><i class="fas fa-bullhorn"></i> መወዓውዒ (Ad)</div>`
                : `<div class="product-price">${product.price}</div>`;

            productCard.innerHTML = `
                ${imageHTML}
                <div class="wishlist-icon" onclick="event.stopPropagation(); toggleHeart(this, '${product._id}')"><i class="${heartClass} fa-heart" style="${heartStyle}"></i></div>
                ${deleteBtnHTML}
                <div class="user-icon" onclick="event.stopPropagation(); goToProfile('${product.sellerId}')">${avatarHTML}</div>
                ${gridPriceHTML}
                <div class="product-title">${product.title}</div>
                <div class="product-location"><i class="fas fa-map-marker-alt" style="font-size:10px;"></i> ${product.location}</div>
            `;
            productsGrid.appendChild(productCard);
        });
    }

    async function deleteProductAdmin(productId) {
        if(confirm("እዚ ንብረት ብርግጽ ካብ ዕዳጋ ክድምሰስ ድዩ? (Admin Action)")) {
            try {
                const response = await fetch(`https://meyda-app.onrender.com/api/products/${productId}`, { method: 'DELETE' });
                if (response.ok) { alert("ኣቕሓ ብዓወት ተደምሲሱ ኣሎ!"); loadProducts(); closeProduct(); } 
                else { alert("ምድምሳስ ኣይተኻእለን።"); }
            } catch (error) { alert("ምስ ሰርቨር ኣይተራኸበን።"); }
        }
    }

    async function toggleHeart(el, productId) {
        const loggedInUser = getLoggedInUser();
        if (!loggedInUser) { alert("ንብረት ንምዕቃብ ሎግ-ኢን ግበሩ!"); window.location.href = 'index.html'; return; }

        const icon = el.querySelector('i'); const isCurrentlySaved = icon.classList.contains('fas');
        if (isCurrentlySaved) { icon.classList.remove('fas'); icon.classList.add('far'); icon.style.color = ''; } 
        else { icon.classList.remove('far'); icon.classList.add('fas'); icon.style.color = '#ff4757'; }

        try {
            const response = await fetch(`https://meyda-app.onrender.com/api/users/${loggedInUser.id}/save`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ productId: productId, action: isCurrentlySaved ? 'remove' : 'add' })
            });
            const data = await response.json();
            if(response.ok) { 
                loggedInUser.savedProducts = data.savedProducts; 
                localStorage.setItem('meydaUser', JSON.stringify(loggedInUser)); 
            } else { 
                alert("ኣይተኻእለን!"); 
                if (isCurrentlySaved) { icon.classList.add('fas'); icon.classList.remove('far'); icon.style.color = '#ff4757'; } 
                else { icon.classList.remove('fas'); icon.classList.add('far'); icon.style.color = ''; } 
            }
        } catch(error) { 
            if (isCurrentlySaved) { icon.classList.add('fas'); icon.classList.remove('far'); icon.style.color = '#ff4757'; } 
            else { icon.classList.remove('fas'); icon.classList.add('far'); icon.style.color = ''; } 
        }
    }
</script>
</body>
</html>
