<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meyda Market - Login & Signup</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --water-blue: #0096c7; 
            --white: #ffffff; 
            --bg-color: #f0f4f8; 
            --text-color: #333; 
            --gray-text: #777; 
            --border-color: #ddd;
            --input-bg: #fafafa;
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .auth-container { background: var(--white); width: 90%; max-width: 400px; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        
        .logo { font-size: 40px; color: var(--water-blue); margin-bottom: 10px; }
        h2 { margin: 0 0 20px 0; color: var(--text-color); }

        .auth-tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid var(--border-color); }
        .tab { flex: 1; padding: 10px; cursor: pointer; font-weight: bold; color: var(--gray-text); transition: 0.3s; }
        .tab.active { color: var(--water-blue); border-bottom: 3px solid var(--water-blue); margin-bottom: -2px; }

        .form-group { text-align: left; margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; color: var(--gray-text); margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; box-sizing: border-box; background: var(--input-bg); font-size: 14px; outline: none; transition: 0.3s;}
        .form-group input:focus { border-color: var(--water-blue); }

        .auth-btn { width: 100%; background: var(--water-blue); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px;}
        .auth-btn:hover { background: #0077a3; }

        .form-section { display: none; animation: fadeIn 0.3s; }
        .form-section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .msg-box { margin-top: 15px; padding: 10px; border-radius: 5px; font-size: 14px; display: none; }
        .msg-box.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block;}
        .msg-box.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block;}
    </style>
</head>
<body>

    <div class="auth-container">
        <i class="fas fa-shopping-bag logo"></i>
        <h2>Meyda Market</h2>

        <div class="auth-tabs">
            <div class="tab active" onclick="switchAuthTab('loginTab', this)">Log In</div>
            <div class="tab" onclick="switchAuthTab('signupTab', this)">Sign Up</div>
        </div>

        <div id="messageBox" class="msg-box"></div>

        <div id="loginTab" class="form-section active">
            <form id="loginForm" onsubmit="loginUser(event)">
                <div class="form-group">
                    <label>ኢሜይል (Email)</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label>ፓስዎርድ (Password)</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="auth-btn">Log In</button>
            </form>
        </div>

        <div id="signupTab" class="form-section">
            <form id="registerForm" onsubmit="registerUser(event)">
                <div class="form-group">
                    <label>ምሉእ ስም (Full Name)</label>
                    <input type="text" id="regName" required>
                </div>
                <div class="form-group">
                    <label>ኢሜይል (Email)</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="form-group">
                    <label>ፓስዎርድ (Password)</label>
                    <input type="password" id="regPassword" required minlength="6">
                </div>
                <button type="submit" class="auth-btn">Create Account</button>
            </form>
        </div>
    </div>

    <script>
        function switchAuthTab(tabId, element) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            element.classList.add('active');

            document.querySelectorAll('.form-section').forEach(section => section.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            
            document.getElementById('messageBox').style.display = 'none';
        }

        async function registerUser(event) {
            event.preventDefault();
            
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const msgBox = document.getElementById('messageBox');

            try {
                const response = await fetch('http://localhost:5000/api/users/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    msgBox.className = 'msg-box success';
                    msgBox.innerText = data.message;
                    document.getElementById('registerForm').reset();
                    // ድሕሪ 2 ሰከንድ ናብ Login tab ይቕይሮ
                    setTimeout(() => switchAuthTab('loginTab', document.querySelector('.tab')), 2000);
                } else {
                    msgBox.className = 'msg-box error';
                    msgBox.innerText = data.message;
                }
            } catch (error) {
                msgBox.className = 'msg-box error';
                msgBox.innerText = "ምስ ሰርቨር ምርኻብ ኣይተኻእለን።";
            }
        }
        async function loginUser(event) {
            event.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const msgBox = document.getElementById('messageBox');

            try {
                const response = await fetch('http://localhost:5000/api/users/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    msgBox.className = 'msg-box success';
                    msgBox.innerText = data.message;
                    
                    // እቲ ዝዓበየ ምስጢር! መንነቱ ኣብ ብራውዘር ንዕቅቦ (Local Storage)
                    localStorage.setItem('meydaUser', JSON.stringify(data.user));
                    
                    // ድሕሪ 1.5 ሰከንድ ብቐጥታ ናብ home.html ወይ profile.html ንወስዶ
                    setTimeout(() => {
                        window.location.href = 'home.html';
                    }, 1500);
                } else {
                    msgBox.className = 'msg-box error';
                    msgBox.innerText = data.message;
                }
            } catch (error) {
                msgBox.className = 'msg-box error';
                msgBox.innerText = "ምስ ሰርቨር ምርኻብ ኣይተኻእለን።";
            }
        }
    </script>
</body>
</html>
