<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meyda Market - Welcome</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --water-blue: #0096c7; 
            --water-blue-hover: #0077a3;
            --white: #ffffff; 
            --bg-color: #f0f4f8; 
            --text-color: #333; 
            --shadow: 0 4px 15px rgba(0, 150, 199, 0.15); 
            --border-color: #ddd;
        }
        body.dark-mode { 
            --white: #1e1e1e; 
            --bg-color: #121212; 
            --text-color: #e0e0e0; 
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.5); 
            --border-color: #444;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            transition: background 0.3s, color 0.3s; 
        }
        
        /* Top Banner */
        .top-banner { 
            background: var(--water-blue); 
            padding: 15px 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .top-banner h1 { 
            margin: 0; 
            color: #ffffff; 
            font-size: 24px; 
            font-weight: bold; 
            letter-spacing: 1px;
        }
        .banner-center {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .social-icons {
            display: flex;
            gap: 12px;
        }
        .social-icons a { 
            font-size: 16px; 
            text-decoration: none; 
            transition: transform 0.3s; 
            text-shadow: 0px 0px 2px rgba(255,255,255,0.8);
        }
        .social-icons a:hover { transform: scale(1.2); }
        
        .theme-toggle { 
            background: rgba(255,255,255,0.2); 
            border: none; 
            padding: 8px 10px; 
            border-radius: 50%; 
            cursor: pointer; 
            color: #ffffff; 
            transition: 0.3s;
        }
        .theme-toggle:hover { background: #ffffff; color: var(--water-blue); }

        /* Auth Container */
        .auth-container { 
            max-width: 400px; 
            margin: 40px auto; 
            background: var(--white); 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: var(--shadow); 
            text-align: center; 
        }
        .auth-container h2 { color: var(--water-blue); margin-bottom: 25px; }
        
        .input-group { 
            margin-bottom: 15px; 
            text-align: left; 
            position: relative;
        }
        .input-group input, .input-group select { 
            width: 100%; 
            padding: 12px; 
            padding-right: 40px; /* Space for icon */
            border: 1px solid var(--border-color); 
            border-radius: 10px; 
            background: var(--bg-color); 
            color: var(--text-color); 
            outline: none; 
            box-sizing: border-box; 
            transition: border 0.3s;
        }
        .input-group input:focus, .input-group select:focus {
            border-color: var(--water-blue);
        }
        
        /* Password Eye Icon */
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #888;
        }
        .toggle-password:hover { color: var(--water-blue); }

        .btn { 
            background: var(--water-blue); 
            color: #fff; 
            border: none; 
            padding: 12px; 
            width: 100%; 
            border-radius: 10px; 
            font-size: 16px;
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: var(--shadow); 
            transition: 0.3s; 
        }
        .btn:hover { background: var(--water-blue-hover); transform: translateY(-2px); }
        
        .toggle-form { 
            color: var(--water-blue); 
            cursor: pointer; 
            margin-top: 15px; 
            display: inline-block; 
            font-size: 14px; 
        }
        .toggle-form:hover { text-decoration: underline; }
        .form-hidden { display: none; }

        /* Social Logins */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: #888;
            font-size: 13px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }
        .divider::before { margin-right: .5em; }
        .divider::after { margin-left: .5em; }

        .social-btn {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }
        .social-btn:hover { background: var(--border-color); }
        .social-btn.google i { color: #DB4437; }
        .social-btn.phone i { color: #4CAF50; }

    </style>
</head>
<body>

    <div class="top-banner">
        <h1>Meyda</h1>
        <div class="banner-center">
            <div class="social-icons">
                <a href="#"><i class="fab fa-facebook-f" style="color: #1877F2;"></i></a>
                <a href="#"><i class="fab fa-youtube" style="color: #FF0000;"></i></a>
                <a href="#"><i class="fab fa-tiktok" style="color: #000000;"></i></a>
                <a href="#"><i class="fab fa-instagram" style="color: #E4405F;"></i></a>
                <a href="#"><i class="fab fa-x-twitter" style="color: #000000;"></i></a>
                <a href="#"><i class="fab fa-telegram" style="color: #229ED9;"></i></a>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()" title="Dark/Light Mode"><i class="fas fa-moon" id="themeIcon"></i></button>
        </div>
    </div>

    <div class="auth-container">
        <h2 id="formTitle">Sign Up (ተመዝገብ)</h2>
        
          <form id="signupForm">
    <div class="input-group">
        <input type="text" id="signupName" placeholder="ምሉእ ስም (Full Name)" required>
    </div>
    <div class="input-group">
        <input type="email" placeholder="ኢሜል (Email)" autocomplete="email" required>
    </div>
    <div class="input-group">
        <input type="tel" id="signupPhone" placeholder="ስልኪ ቁጽሪ (Phone Number)" required>
    </div>
    <div class="input-group">
        <select required>
            <option value="" disabled selected>ጾታ ምረጽ (Gender)</option>
            <option value="male">ተባዕታይ</option>
            <option value="female">ኣንስታይ</option>
        </select>
    </div>
    <div class="input-group">
        <input type="password" id="signupPassword" placeholder="ሓዱሽ ፓስዎርድ" autocomplete="new-password" required>
        <i class="fas fa-eye toggle-password" onclick="togglePassword('signupPassword', this)"></i>
    </div>
    <div class="input-group">
        <input type="password" id="confirmPass" placeholder="ፓስዎርድ ኣረጋግጽ" autocomplete="new-password" required>
        <i class="fas fa-eye toggle-password" onclick="togglePassword('confirmPass', this)"></i>
    </div>
    <button class="btn" type="submit">Sign Up</button>   
            <div class="divider">ወይ ድማ ብዝስዕቡ እቶ</div>
            <button type="button" class="social-btn google"><i class="fab fa-google"></i> Continue with Google</button>
            <button type="button" class="social-btn phone"><i class="fas fa-phone-alt"></i> Continue with Phone (OTP)</button>
        </form>

        <form id="loginForm" class="form-hidden">
    <div class="input-group">
        <input type="tel" id="loginPhone" placeholder="ስልኪ ቁጽሪ (Phone Number)" required>
    </div>
    <div class="input-group">
        <input type="password" id="loginPassword" placeholder="ፓስዎርድ (Password)" required>
        <i class="fas fa-eye toggle-password" onclick="togglePassword('loginPassword', this)"></i>
    </div>
    <button class="btn" type="submit">Log In</button>

    <div class="divider">ወይ ድማ ብዝስዕቡ እቶ</div>
    <button type="button" class="social-btn google"><i class="fab fa-google"></i> Continue with Google</button>
    <button type="button" class="social-btn phone"><i class="fas fa-phone-alt"></i> Continue with Phone (OTP)</button>
</form>

        <div class="toggle-form" id="toggleText" onclick="toggleAuthMode()">ኣካውንት ኣለካዶ? <b>Log In (እቶ)</b></div>
    </div>

    <script>
        // Theme Toggle Logic
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }
        window.onload = () => { 
            if(localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeIcon').className = 'fas fa-sun';
            } 
        }

        // Show/Hide Password Logic
        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = "password";
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // Form Toggle Logic
        function toggleAuthMode() {
            const signupForm = document.getElementById('signupForm');
            const loginForm = document.getElementById('loginForm');
            const formTitle = document.getElementById('formTitle');
            const toggleText = document.getElementById('toggleText');

            if (signupForm.classList.contains('form-hidden')) {
                signupForm.classList.remove('form-hidden');
                loginForm.classList.add('form-hidden');
                formTitle.innerText = "Sign Up (ተመዝገብ)";
                toggleText.innerHTML = "ኣካውንት ኣለካዶ? <b>Log In (እቶ)</b>";
            } else {
                signupForm.classList.add('form-hidden');
                loginForm.classList.remove('form-hidden');
                formTitle.innerText = "Log In (እቶ)";
                toggleText.innerHTML = "ኣካውንት የብልካን? <b>Sign Up (ተመዝገብ)</b>";
            }
        }
        // =====================================================================
// API መራኸቢ: Sign Up ፎርም ምስ ሰርቨር/ዳታቤዝ
// =====================================================================

// 1. ነቲ ናይ ምዝገባ ፎርም (Sign Up Form) ብ ID ንሕዞ
const signupFormElement = document.getElementById('signupForm');

if (signupFormElement) {
    // እቲ ፎርም ክስደድ (Submit ክኸውን) ከሎ ነዚ ዝስዕብ ሎጂክ ይሰርሕ
    signupFormElement.addEventListener('submit', async function(e) {
        
        // እዚኣ ነቲ ዌብሳይት ሪፍረሽ (Refresh) ከይከውን ትኽልክሎ (ሓበሬታ መታን ከይጠፍእ)
        e.preventDefault(); 

        // 2. ካብቶም ናይ ፎርም ሳጹናት (Inputs) ሓበሬታ ንወስድ
        // (ኣስተውዕል: እዞም 'signupName', 'signupPhone' ዝብሉ IDs ምስቲ ኣብ HTML ዘለካ ኣስማት ክመሳሰሉ ኣለዎም)
        const fullNameValue = document.getElementById('signupName').value;
        const phoneValue = document.getElementById('signupPhone').value;
        const passwordValue = document.getElementById('signupPassword').value;

        try {
            // 3. ነቲ ሓበሬታ ናብ ሰርቨርና (Localhost:5000) ንሰዶ (Fetch API ንጥቀም)
            const response = await fetch('http://localhost:5000/api/signup', {
                method: 'POST', // ሓበሬታ ንሰድድ ስለዘለና POST ንጥቀም
                headers: {
                    'Content-Type': 'application/json' // እቲ ዳታ ብ JSON ፎርማት ከምዝስደድ ንነግር
                },
                body: JSON.stringify({
                    // እዞም ኣስማት ምስቲ ኣብ server.js ዘሎ Schema 100% ክመሳሰሉ ኣለዎም
                    fullName: fullNameValue,
                    phone: phoneValue,
                    password: passwordValue
                })
            });

            // 4. ካብ ሰርቨር ዝመጸና መልሲ ንቕበል
            const data = await response.json(); 

            // 5. ሰርቨር ብትኽክል ተቐቢሉዎ (Status 201) እንተኾይኑ
            if (response.ok) {
                alert('✅ ' + data.message); // "ብዓወት ተመዝጊብኩም..." ዝብል ፖፕ-ኣፕ የርኢ
                signupFormElement.reset();   // ነቲ ፎርም ባዶ ይገብሮ (የጽርዮ)
                
                // (ኣማራጺ): ድሕሪ ምዝገባ ብቐጥታ ናብ ናይ Log In ፎርም ንክቕየር ክትገብር ትኽእል
                // toggleAuthMode(); 
            } else {
                // ቁጽሪ ስልኪ ተደጊሙ ወይ ካልእ ጌጋ እንተሎ ናይ ጌጋ መልእኽቲ የርኢ
                alert('❌ ጌጋ: ' + data.message);
            }

        } catch (error) {
            // ሰርቨር ጠፊኡ (Run ኣይገበረን) እንተኾይኑ ዝመጽእ ጌጋ
            console.error('Connection Error:', error);
            alert('❌ ምስ ሰርቨር ክራኸብ ኣይከኣለን። በጃኹም ሰርቨር Run ምግባሩ ኣረጋግጹ።');
        }
    });
}
// =====================================================================
// API መራኸቢ: Log In (እቶ) ፎርም ምስ ሰርቨር/ዳታቤዝ
// =====================================================================
const loginFormElement = document.getElementById('loginForm');

if (loginFormElement) {
    loginFormElement.addEventListener('submit', async function(e) {
        
        e.preventDefault(); // ዌብሳይት ሪፍረሽ ከይከውን ይኽልክል

        // ካብ ፎርም ሓበሬታ ንወስድ
        const phoneValue = document.getElementById('loginPhone').value;
        const passwordValue = document.getElementById('loginPassword').value;

        try {
            // ናብ ሰርቨር ንልእኮ
            const response = await fetch('http://localhost:5000/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    phone: phoneValue,
                    password: passwordValue
                })
            });

            const data = await response.json();

            if (response.ok) {
                alert('✅ ' + data.message); // ብዓወት ምስ ኣተወ ፖፕ-ኣፕ የርኢ
                
                // ብዓወት ስለዝኣተወ፡ ብቐጥታ ናብ ናይ ዕዳጋ ፔጅ (home.html) ንሰዶ!
                window.location.href = 'home.html'; 
            } else {
                alert('❌ ጌጋ: ' + data.message); // ጌጋ ፓስዎርድ ወይ ስልኪ እንተኾይኑ
            }

        } catch (error) {
            console.error('Login Error:', error);
            alert('❌ ምስ ሰርቨር ክራኸብ ኣይከኣለን። በጃኹም ሰርቨር Run ምግባሩ ኣረጋግጹ።');
        }
    });
}
    </script>
</body>
</html>
