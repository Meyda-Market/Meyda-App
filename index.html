<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meyda Market - Login / Signup</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* =====================================================================
           1. ሓፈሻዊ ዲዛይንን ሕብርታትን (General Styles & Meyda Brand Colors)
           ===================================================================== */
        :root {
            /* ሕብሪ Meyda ብትኽክል (#00a2e8) */
            --primary-color: #00a2e8; 
            --primary-hover: #0084bf;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --white: #ffffff;
            --error-color: #ff4d4f;
            --border-radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        /* =====================================================================
           2. ማእከላይ ሳጹንን ሎጎን (Auth Container & Logo)
           ===================================================================== */
        .auth-container {
            background: var(--white); width: 100%; max-width: 450px;
            padding: 40px 30px; border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center;
        }

        .brand-logo {
            font-size: 2.8rem;
            color: var(--primary-color);
            font-weight: 800; margin-bottom: 25px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        /* =====================================================================
           3. መምረጺ ታብ (Login / Signup Tabs)
           ===================================================================== */
        .tabs {
            display: flex; background: #eee; border-radius: 30px;
            margin-bottom: 30px; position: relative; overflow: hidden;
        }

        .tab-btn {
            flex: 1; padding: 12px; border: none; background: none;
            font-size: 1.1rem; font-weight: 600; color: #777;
            cursor: pointer; transition: color 0.3s; z-index: 1;
        }

        .tab-btn.active { color: var(--white); }

        .tab-slider {
            position: absolute; top: 0; left: 0; width: 50%; height: 100%;
            background: var(--primary-color); border-radius: 30px;
            transition: transform 0.3s ease; z-index: 0;
        }

        /* =====================================================================
           4. ቅጥዕታትን መእተዊታትን (Forms & Inputs)
           ===================================================================== */
        .auth-form { display: none; text-align: left; }
        .auth-form.active { display: block; animation: fadeIn 0.4s ease; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.9rem; margin-bottom: 5px; color: #555; }

        .form-group input, .form-group select {
            width: 100%; padding: 12px; border: 1px solid #ccc;
            border-radius: 8px; font-size: 1rem; transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary-color); outline: none;
        }
        .form-group input.error { border-color: var(--error-color); }

        .phone-group { display: flex; gap: 10px; }
        .phone-group select { width: 35%; background: #f9f9f9; cursor: pointer; }
        .phone-group input { width: 65%; }

        /* =====================================================================
           5. መጥወቒታት (Buttons)
           ===================================================================== */
        .btn-submit {
            width: 100%; padding: 12px; background: var(--primary-color);
            color: var(--white); border: none; border-radius: 8px;
            font-size: 1.1rem; font-weight: bold; cursor: pointer;
            transition: background 0.3s; margin-top: 10px;
        }
        .btn-submit:hover { background: var(--primary-hover); }

        .social-btn {
            width: 100%; padding: 12px; background: #fff; color: #333;
            border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            gap: 10px; margin-bottom: 15px; transition: background 0.3s;
        }
        .social-btn:hover { background: #f4f4f4; }

        .divider {
            display: flex; align-items: center; text-align: center; margin: 20px 0; color: #888;
        }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #ddd; }
        .divider:not(:empty)::before { margin-right: .25em; }
        .divider:not(:empty)::after { margin-left: .25em; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* =====================================================================
           🚀 ሓዱሽ ማጂክ: ዲዛይን ን Forgot Password Modal
           ===================================================================== */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center;
            backdrop-filter: blur(3px);
        }
        .modal-content {
            background: var(--white); width: 90%; max-width: 400px;
            padding: 30px; border-radius: var(--border-radius); text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); position: relative;
        }
        .close-btn {
            position: absolute; top: 10px; right: 15px; font-size: 24px; 
            cursor: pointer; color: #777; border: none; background: none; transition: 0.2s;
        }
        .close-btn:hover { color: var(--error-color); }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="brand-logo">
        <i class="fas fa-shopping-bag"></i> Meyda
    </div>

    <div class="tabs">
        <div class="tab-slider" id="tabSlider"></div>
        <button class="tab-btn active" onclick="switchTab('login')">Login (እቶ)</button>
        <button class="tab-btn" onclick="switchTab('signup')">Sign Up (ተመዝገብ)</button>
    </div>

    <div id="loginForm" class="auth-form active">
        <button type="button" class="social-btn" onclick="startGoogleAuth()">
            <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" alt="Google" style="width: 20px;">
            Continue with Google
        </button>
        
        <div class="divider">OR</div>

        <form id="loginActualForm">
            <div class="form-group">
                <label>Email or Phone (ኢሜይል ወይ ስልኪ)</label>
                <input type="text" id="loginId" placeholder="Enter Email or Phone" autocomplete="email" required>
            </div>
            <div class="form-group">
                <label style="display: flex; justify-content: space-between;">
                    <span>Password (ፓስዋርድ)</span>
                    <span style="color: var(--primary-color); cursor: pointer; font-size: 0.85rem; font-weight: bold;" onclick="openForgotModal()">Forgot Password?</span>
                </label>
                <input type="password" id="loginPassword" placeholder="Enter Password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-submit">Login to Meyda</button>
        </form>
    </div>

    <div id="signupForm" class="auth-form">
        
        <div id="signupMethodSelection">
            <button type="button" class="social-btn" onclick="startGoogleAuth()">
                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" alt="Google" style="width: 20px;">
                Continue with Google
            </button>
            <button type="button" class="social-btn" onclick="showPhoneSignup()">
                <i class="fas fa-phone-alt" style="color: var(--primary-color); font-size: 1.2rem;"></i>
                Continue with Phone
            </button>
        </div>

        <div id="signupDetails" style="display: none;">
            <button type="button" style="background:none; border:none; color:var(--primary-color); cursor:pointer; margin-bottom:15px; font-weight: bold;" onclick="backToMethods()">
                <i class="fas fa-arrow-left"></i> ንድሕሪት ተመለስ
            </button>
            
            <form id="signupActualForm">
                <div class="form-group">
                    <label>Phone Number (ቁጽሪ ስልኪ)</label>
                    <div class="phone-group">
                        <select id="countryCode">
                            <option value="+251">🇪🇹 +251</option>
                            <option value="+254">🇰🇪 +254</option>
                            <option value="+1">🇺🇸 +1</option>
                        </select>
                        <input type="tel" id="signupPhone" placeholder="911223344" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Full Name (ምሉእ ስም)</label>
                    <input type="text" id="signupName" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label>Create Password (ፓስዋርድ ፍጠር)</label>
                    <input type="password" id="signupPassword" placeholder="Create a strong password" required>
                </div>
                <button type="submit" class="btn-submit">Complete Sign Up</button>
            </form>
        </div>

    </div>
</div>

<div class="modal-overlay" id="forgotPasswordModal">
    <div class="modal-content" id="fpStep1">
        <button class="close-btn" onclick="closeForgotModal()">&times;</button>
        <h3 style="margin-bottom: 15px; color: var(--text-color);">ፓስዋርድ ጠፊኡኩም?</h3>
        <p style="font-size: 0.9rem; color: #666; margin-bottom: 20px;">ቁጽሪ ስልኪኹም ወይ ኢሜይልኩም ኣእትዉ እሞ ናይ መረጋገጺ (OTP) ክንሰደልኩም ኢና።</p>
        <div class="form-group" style="text-align: left;">
            <input type="text" id="fpIdentifier" placeholder="Email or Phone (+251...)" required>
        </div>
        <button class="btn-submit" id="btnSendOTP" onclick="requestOTP()">OTP ስደድ (Send OTP)</button>
    </div>

    <div class="modal-content" id="fpStep2" style="display: none;">
        <button class="close-btn" onclick="closeForgotModal()">&times;</button>
        <h3 style="margin-bottom: 15px; color: var(--text-color);">OTP ኣረጋግጹ</h3>
        <p style="font-size: 0.9rem; color: #666; margin-bottom: 20px;">ናብ <b id="fpDisplayId" style="color: var(--primary-color);"></b> ዝተላእከ 4 ቁጽሪ ኣእትዉ።</p>
        <div class="form-group" style="text-align: left;">
            <label>4 ቁጽሪ OTP</label>
            <input type="text" id="fpOtpCode" placeholder="1234" maxlength="4" style="text-align: center; font-size: 1.5rem; letter-spacing: 10px; font-weight: bold;" required>
        </div>
        <div class="form-group" style="text-align: left;">
            <label>ሓዱሽ ፓስዋርድ (New Password)</label>
            <input type="password" id="fpNewPassword" placeholder="ሓዱሽ ፓስዋርድ ፍጠሩ" required>
        </div>
        <button class="btn-submit" id="btnVerifyOTP" onclick="verifyAndResetPassword()">ፓስዋርድ ቀይር (Reset)</button>
    </div>
</div>

<script>
    // 👻 ሓዱሽ ማጂክ: ሎግ-ኢን ጌሩ እንተጸኒሑ ብቐጥታ ናብ home.html ይሰዶ!
    function getLoggedInUser() {
        try {
            let userStr = localStorage.getItem('meydaUser') || localStorage.getItem('meyda_user');
            if (!userStr || userStr === 'undefined' || userStr === 'null') return null;
            
            let userObj = JSON.parse(userStr);
            if (userObj.user) userObj = userObj.user;
            
            if (!userObj || (!userObj.id && !userObj._id)) return null;
            return userObj;
        } catch(e) { 
            return null; 
        }
    }

    // ፔጅ ክኽፈት ከሎ ዝግበር ፍተሻ
    window.onload = () => {
        const user = getLoggedInUser();
        if (user) {
            window.location.href = 'home.html';
        }
    };

    function switchTab(tab) {
        const slider = document.getElementById('tabSlider');
        const btns = document.querySelectorAll('.tab-btn');
        
        if (tab === 'login') {
            slider.style.transform = 'translateX(0)';
            btns[0].classList.add('active');
            btns[1].classList.remove('active');
            document.getElementById('loginForm').classList.add('active');
            document.getElementById('signupForm').classList.remove('active');
            backToMethods();
        } else {
            slider.style.transform = 'translateX(100%)';
            btns[1].classList.add('active');
            btns[0].classList.remove('active');
            document.getElementById('signupForm').classList.add('active');
            document.getElementById('loginForm').classList.remove('active');
        }
    }

    function showPhoneSignup() {
        document.getElementById('signupMethodSelection').style.display = 'none';
        document.getElementById('signupDetails').style.display = 'block';
    }

    function backToMethods() {
        document.getElementById('signupDetails').style.display = 'none';
        document.getElementById('signupMethodSelection').style.display = 'block';
    }

    function startGoogleAuth() {
    // ብቐጥታ ናብቲ ናይ Render ባክ-ኤንድ (Backend) ክወስደና እዩ
    window.location.href = "https://meyda-app.onrender.com/auth/google";
}


    // SIGNUP API
    document.getElementById('signupActualForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const phoneInput = document.getElementById('signupPhone');
        const phoneVal = phoneInput.value.trim();

        if (phoneVal.length < 9) {
            phoneInput.classList.add('error');
            alert("በጃኹም ትኽክለኛ ቁጽሪ ስልኪ ኣእትዉ!");
            return;
        } else {
            phoneInput.classList.remove('error');
        }

        const fullPhone = document.getElementById('countryCode').value + phoneVal;
        const name = document.getElementById('signupName').value;
        const password = document.getElementById('signupPassword').value;

        try {
            const response = await fetch('https://meyda-app.onrender.com/api/users/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    name: name, 
                    phone: fullPhone,
                    email: fullPhone.replace('+', '') + '@meyda.com', 
                    password: password 
                })
            });
            const data = await response.json();
            
            if(response.ok) {
                // Auto-login after successful registration
                const loginRes = await fetch('https://meyda-app.onrender.com/api/users/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: fullPhone, password: password })
                });
                
                const loginData = await loginRes.json();
                
                if(loginRes.ok) {
                    // 🛡️ ሓዱሽ ማጂክ: ምዕሩይ መኽዘን - 'meydaUser'
                    localStorage.setItem('meydaUser', JSON.stringify(loginData.user || loginData));
                    window.location.href = 'home.html';
                }
            } else {
                alert(data.message); 
            }
        } catch(err) {
            console.error("Signup Error:", err);
            alert("ጌጋ ኣጋጢሙ። ሰርቨር ዝሰርሕ ዘሎ ምዃኑ ኣረጋግጽ።");
        }
    });

    // LOGIN API
    document.getElementById('loginActualForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('loginId').value.trim();
        const password = document.getElementById('loginPassword').value;
        
        try {
            const response = await fetch('https://meyda-app.onrender.com/api/users/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: id, password: password })
            });
            
            const data = await response.json();
            if(response.ok) {
                // 🛡️ ሓዱሽ ማጂክ: ምዕሩይ መኽዘን - 'meydaUser'
                localStorage.setItem('meydaUser', JSON.stringify(data.user || data));
                window.location.href = 'home.html';
            } else {
                alert(data.message); 
            }
        } catch(err) {
            console.error("Login Error:", err);
            alert("ጌጋ ኣጋጢሙ። ሰርቨር ዝሰርሕ ዘሎ ምዃኑ ኣረጋግጽ።");
        }
    });

    // =====================================================================
    // 🚀 ሓዱሽ ማጂክ: Forgot Password Logic (OTP)
    // =====================================================================
    function openForgotModal() {
        document.getElementById('forgotPasswordModal').style.display = 'flex';
        document.getElementById('fpStep1').style.display = 'block';
        document.getElementById('fpStep2').style.display = 'none';
        document.getElementById('fpIdentifier').value = document.getElementById('loginId').value; // ካብ ሎግ-ኢን እንተጽሒፉዎ ኮፒ ይገብሮ
    }

    function closeForgotModal() {
        document.getElementById('forgotPasswordModal').style.display = 'none';
    }

    async function requestOTP() {
        const identifier = document.getElementById('fpIdentifier').value.trim();
        if (!identifier) { alert("በጃኹም ኢሜይል ወይ ቁጽሪ ስልኪ ኣእትዉ!"); return; }

        const btn = document.getElementById('btnSendOTP');
        btn.innerText = "ይሰድድ ኣሎ..."; btn.disabled = true;

        try {
            const response = await fetch('https://meyda-app.onrender.com/api/users/forgot-password', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ identifier })
            });
            const data = await response.json();
            
            if (response.ok) {
                alert("✅ OTP ብዓወት ተላኢኹ ኣሎ! (ንግዚኡ 4 ቁጽሪ ኣብ ናይ ሰርቨር (Render) Logs ርኣዮ)");
                document.getElementById('fpDisplayId').innerText = identifier;
                document.getElementById('fpStep1').style.display = 'none';
                document.getElementById('fpStep2').style.display = 'block';
            } else { alert("❌ " + data.message); }
        } catch (error) { alert("ምስ ሰርቨር ኣይተራኸበን።"); } 
        finally { btn.innerText = "OTP ስደድ (Send OTP)"; btn.disabled = false; }
    }

    async function verifyAndResetPassword() {
        const identifier = document.getElementById('fpDisplayId').innerText;
        const otp = document.getElementById('fpOtpCode').value.trim();
        const newPassword = document.getElementById('fpNewPassword').value.trim();

        if (!otp || !newPassword) { alert("በጃኹም ኩሉ ቦታ ምልእዎ!"); return; }

        const btn = document.getElementById('btnVerifyOTP');
        btn.innerText = "ይቕይር ኣሎ..."; btn.disabled = true;

        try {
            const response = await fetch('https://meyda-app.onrender.com/api/users/reset-password', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ identifier, otp, newPassword })
            });
            const data = await response.json();
            
            if (response.ok) {
                alert("✅ " + data.message);
                closeForgotModal();
                document.getElementById('loginId').value = identifier;
                document.getElementById('loginPassword').value = '';
            } else { alert("❌ " + data.message); }
        } catch (error) { alert("ምስ ሰርቨር ኣይተራኸበን።"); } 
        finally { btn.innerText = "ፓስዋርድ ቀይር (Reset)"; btn.disabled = false; }
    }
</script>

</body>
</html>
